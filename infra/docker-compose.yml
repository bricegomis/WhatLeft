version: "3.9"

services:
  api:
    image: ghcr.io/bricegomis/whatleft-api:latest
    container_name: whatleft-api
    restart: unless-stopped
    networks:
      - proxy
    environment:
      ASPNETCORE_ENVIRONMENT: Production

      # Auth0
      Auth0__Domain: ${AUTH0_DOMAIN}
      Auth0__Audience: ${AUTH0_AUDIENCE}
      Auth0__ClientId: ${AUTH0_CLIENT_ID}

      # PostgreSQL / Neon
      ConnectionStrings__Tasks: ${DB_CONNECTION_STRING}

      # CORS — must match the public frontend URL
      Cors__AllowedOrigin: ${FRONTEND_URL}

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    image: ghcr.io/bricegomis/whatleft-web:latest
    container_name: whatleft-web
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      api:
        condition: service_healthy

networks:
  proxy:
    external: true