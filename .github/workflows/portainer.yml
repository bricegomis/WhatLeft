name: Redeploy Portainer Stack

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'

jobs:
  redeploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Portainer stack redeploy
        run: |
          curl -sf -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}" \
            --max-time 10 \
            --retry 3 \
            --retry-delay 5
