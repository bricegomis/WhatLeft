name: Build & Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/bricegomis/whatleft-api
  WEB_IMAGE: ghcr.io/bricegomis/whatleft-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Permissions requises pour publier sur GHCR avec GITHUB_TOKEN
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.API_IMAGE }}:latest
          # Layer cache partagé entre les runs GitHub Actions
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      # ── Frontend ────────────────────────────────────────────────────────────
      # Les VITE_* sont baked in à la compilation — à configurer dans
      # Settings → Variables → Actions (onglet "Variables", pas "Secrets")
      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: ./clients/web
          push: true
          tags: ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_AUTH0_DOMAIN=${{ vars.VITE_AUTH0_DOMAIN }}
            VITE_AUTH0_CLIENT_ID=${{ vars.VITE_AUTH0_CLIENT_ID }}
            VITE_AUTH0_AUDIENCE=${{ vars.VITE_AUTH0_AUDIENCE }}
