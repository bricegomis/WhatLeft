server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes go to index.html (Vue Router history mode)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets indefinitely
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml text/javascript
               image/svg+xml;
    gzip_min_length 1024;
}
